name: 'cibuild-action'
description: 'Run mobile CI/CD pipelines for iOS and Android projects'
author: 'invarnhq'

branding:
  icon: 'play-circle'
  color: 'blue'

inputs:
  pipeline:
    description: 'Path to pipeline YAML file (default: auto-discover from .ci/pipelines/)'
    required: false
    default: ''
  workflow:
    description: 'Workflow name within the pipeline'
    required: false
    default: ''
  version:
    description: 'cibuild version to install (e.g. "1.2.3"). Default: latest'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Install cibuild
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ] || [ -z "$VERSION" ]; then
          npm install -g @invarn/cibuild
        else
          npm install -g "@invarn/cibuild@${VERSION}"
        fi
        echo "Installed $(cibuild --version)"

    - name: Install dependencies
      shell: bash
      run: |
        # Auto-detect pipeline file
        PIPELINE="${{ inputs.pipeline }}"
        if [ -z "$PIPELINE" ]; then
          PIPELINE=$(find .ci/pipelines -name "*.yml" -o -name "*.yaml" 2>/dev/null | head -1)
        fi

        if [ -n "$PIPELINE" ] && [ -f "$PIPELINE" ]; then
          # Check if pipeline uses Fastlane-dependent steps
          if grep -qE '\b(fastlane|app-store-deploy|google-play-deploy)@' "$PIPELINE"; then
            if ! command -v fastlane &>/dev/null; then
              echo "Pipeline uses Fastlane-dependent steps — installing Fastlane..."
              if [ -f "Gemfile" ] && grep -q "fastlane" Gemfile 2>/dev/null; then
                gem install bundler --no-document
                bundle install --jobs 4 --retry 3
              else
                gem install fastlane --no-document
              fi
              echo "Installed $(fastlane --version | head -1)"
            else
              echo "Fastlane already available: $(fastlane --version | head -1)"
            fi
          fi
        fi

    - name: Run pipeline
      shell: bash
      env:
        GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
        GIT_COMMIT: ${{ github.sha }}
        GIT_REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}.git
        BUILD_NUMBER: ${{ github.run_number }}
        BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        CMD="ci run"

        PIPELINE="${{ inputs.pipeline }}"
        if [ -n "$PIPELINE" ]; then
          if [ ! -f "$PIPELINE" ]; then
            echo "::error::Pipeline file not found: $PIPELINE"
            exit 1
          fi
          CMD="$CMD $PIPELINE"
        fi

        WORKFLOW="${{ inputs.workflow }}"
        if [ -n "$WORKFLOW" ]; then
          CMD="$CMD -w $WORKFLOW"
        fi

        echo "Running: $CMD"
        echo ""
        eval "$CMD"
